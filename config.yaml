# =============================================================================
# config.yaml — Industrial Machine Health Monitor v2
# Architecture: Sensors → AWS IoT Core → IoT Rule → SQS → Lambda → DynamoDB/S3/SNS
#               Dashboard reads DynamoDB via Flask API
# =============================================================================

machine:
  id: "machine_01"
  location: "Plant-A"

# ── AWS IoT Core (replaces Mosquitto entirely) ────────────────────────────────
iot:
  endpoint: "a2s5usvnbernh1-ats.iot.us-east-1.amazonaws.com" # e.g. abc123-ats.iot.eu-west-1.amazonaws.com
  port: 8883
  client_id_prefix: "imhm"
  cert_path: "certs/device.pem.crt"
  private_key_path: "certs/private.pem.key"
  root_ca_path: "certs/AmazonRootCA1.pem"
  keepalive: 60

# ── Sensor MQTT topics (published directly to IoT Core) ──────────────────────
sensors:
  vibration:
    topic: "factory/machine_01/vibration"
    publish_interval_seconds: 1
    normal_range: [2.0, 12.0]          # mm/s
    fault_range:  [18.0, 35.0]
    fault_injection_probability: 0.05
    unit: "mm/s"

  temperature:
    topic: "factory/machine_01/temperature"
    publish_interval_seconds: 2
    normal_range: [60.0, 85.0]         # °C
    fault_range:  [100.0, 130.0]
    fault_injection_probability: 0.04
    unit: "°C"

  current:
    topic: "factory/machine_01/current"
    publish_interval_seconds: 1
    normal_range: [12.0, 20.0]         # A
    fault_range:  [28.0, 40.0]
    fault_injection_probability: 0.04
    unit: "A"

  acoustic:
    topic: "factory/machine_01/acoustic"
    publish_interval_seconds: 1
    normal_range: [55.0, 75.0]         # dB
    fault_range:  [90.0, 115.0]
    fault_injection_probability: 0.05
    unit: "dB"

# ── Fog node settings ─────────────────────────────────────────────────────────
fog:
  subscribe_topic: "factory/machine_01/#"
  processed_topic: "plant/processed/machine_health"
  aggregation_window_seconds: 10
  dispatch_interval_seconds: 10

  thresholds:
    vibration_rms_warning:  10.0
    vibration_rms_critical: 16.0
    temperature_warning:    88.0
    temperature_critical:  100.0
    current_warning:        22.0
    current_critical:       28.0
    acoustic_warning:       78.0
    acoustic_critical:      90.0

# ── AWS services ──────────────────────────────────────────────────────────────
aws:
  region: "${AWS_REGION}"
  dynamo_latest_table:  "MachineLatestStatus"
  dynamo_history_table: "MachineHistory"
  s3_bucket:            "${S3_BUCKET_NAME}"
  sns_topic_arn:        "${SNS_TOPIC_ARN}"    # critical-state alert notifications

logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s — %(message)s"
