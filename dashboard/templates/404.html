{% extends "base.html" %}
{% block title %}Not Found — IMHM{% endblock %}
{% block content %}
<div class="wrap" style="text-align:center;padding:80px 24px;">
  <div style="font-family:var(--display);font-size:56px;color:var(--border);margin-bottom:16px;letter-spacing:.1em;">404</div>
  <div style="font-family:var(--display);font-size:14px;color:var(--muted);letter-spacing:.12em;margin-bottom:10px;">
    MACHINE "{{ machine_id|upper }}" NOT FOUND
  </div>
  <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:28px;">
    No data received yet. Ensure sensors and fog node are connected to AWS IoT Core.
  </div>
  <a href="/dashboard" style="font-family:var(--mono);font-size:11px;color:var(--glow);text-decoration:none;letter-spacing:.1em;">← BACK TO OVERVIEW</a>
</div>
{% endblock %}
